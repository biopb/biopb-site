name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history: build_skills_catalog.py derives each skill's `updated`
          # date from `git log -1 -- <file>`. A shallow (depth-1) clone only has
          # HEAD, so any skill not touched in the latest commit would fall back
          # to today's date. See docs/skill-interface.md §5.1.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cairo/pango (mkdocs social plugin)
        # The Material 'social' plugin renders OG cards via Pillow + CairoSVG,
        # which need these native libs at build time. See mkdocs.yml plugins:.
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev \
            libjpeg-dev libpng-dev libz-dev libpango1.0-dev

      - name: Build docs
        run: |
          pip install -r requirements-docs.txt
          mkdocs build --strict   # outputs to ./site

      - name: Build skills catalog
        # Generate skills/catalog.json in-tree BEFORE the landing rsync below,
        # which uploads repo root (catalog.json is gitignored; the source of
        # truth is skills/*.md). docs/skill-interface.md §2, §8.2.
        run: python scripts/build_skills_catalog.py

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H biopb.org >> ~/.ssh/known_hosts

      - name: Deploy landing site with rsync
        run: |
          # The single --exclude='docs/' both skips uploading the Markdown source and
          # shields the deployed /docs/ directory from --delete.
          #
          # --exclude='install/' shields /install/, another subtree owned by a
          # SEPARATE pipeline: the biopb repo's install-scripts workflow rsyncs
          # install.sh / install.ps1 / biopb-engine.ps1 there (served at
          # biopb.org/install.sh etc. via nginx). This repo never ships them, so
          # without the exclude a push-to-main deploy here would wipe them.
          #
          # --exclude='scripts/' keeps the skills-catalog build tooling
          # (build_skills_catalog.py, skill_schema.py) out of the public web
          # root -- only its OUTPUT, skills/catalog.json, is meant to ship.
          # --exclude='.claude' keeps local agent config (settings.local.json)
          # from leaking to biopb.org.
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='.cache' \
            --exclude='scripts/' \
            --exclude='*.mp4' \
            --exclude='docs/' \
            --exclude='install/' \
            --exclude='site/' \
            --exclude='mkdocs.yml' \
            --exclude='requirements-docs.txt' \
            --exclude='.venv-docs' \
            --exclude='__pycache__' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ jyu@biopb.org:/var/www/biopb.org/

      - name: Deploy docs with rsync
        run: |
          # --exclude='api/' carves out /docs/api/ from this --delete. That
          # subtree is owned by a SEPARATE pipeline: the biopb repo's release
          # workflow generates the SDK API reference (Python via mkdocstrings,
          # Java via javadoc) and rsyncs it into /docs/api/<lang>/ on each v*
          # tag. Without this exclude, the next push-to-main deploy here would
          # wipe it (mkdocs ./site/ never contains api/).
          rsync -avz --delete \
            --exclude='api/' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./site/ jyu@biopb.org:/var/www/biopb.org/docs/
