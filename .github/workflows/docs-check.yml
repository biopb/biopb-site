name: Docs build check

# Validates the docs build on pull requests, without deploying or touching
# secrets. The Deploy workflow builds + ships only on push to main.
on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build docs (strict)
        run: |
          pip install -r requirements-docs.txt
          mkdocs build --strict
