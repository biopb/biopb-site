name: Docs build check

# Validates the docs build AND the skills catalog on pull requests, without
# deploying or touching secrets. The Deploy workflow builds + ships only on
# push to main.
on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cairo/pango (mkdocs social plugin)
        # The Material 'social' plugin (mkdocs.yml) renders OG cards via
        # Pillow + CairoSVG, which need these native libs. Keep in sync with
        # the same step in deploy.yml.
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev \
            libjpeg-dev libpng-dev libz-dev libpango1.0-dev

      - name: Install docs toolchain
        run: pip install -r requirements-docs.txt

      - name: Validate skills catalog
        # The curation gate (docs/skill-interface.md §2, §8.1): malformed
        # frontmatter, duplicate ids, unknown tags, bad semver -> fail the PR,
        # so the AUTHOR sees the error, never the runtime agent. --check does
        # not write catalog.json (that happens only on deploy).
        run: python scripts/build_skills_catalog.py --check

      - name: Build docs (strict)
        run: mkdocs build --strict
