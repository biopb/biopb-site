site_name: biopb docs
site_description: End-user documentation for biopb — open bioimage analysis, driven by your agent.
site_url: https://biopb.org/docs/
repo_url: https://github.com/biopb/biopb
repo_name: biopb/biopb
edit_uri: ""

# Built by CI into ./site, then rsynced to /var/www/biopb.org/docs/ (gitignored).
site_dir: site

# skills.md is deliberately served-but-unlinked: the page ships (reachable at
# /docs/skills/) while its nav entry is held back until the skills catalog is
# advertised (docs/skill-interface.md §8.2). Declaring it here keeps --strict
# from failing on "exists but not in nav". To advertise it, add a nav entry
# under Using biopb and drop this line.
not_in_nav: |
  skills.md

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.ico
  palette:
    scheme: default
    primary: custom
    accent: custom
  font:
    text: false   # use the system font stack, matching the landing page
    code: false
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/biopb
  # "Back to biopb.org" — the landing page lives one level up from /docs/.
  homepage: https://biopb.org/

plugins:
  # Declaring plugins: disables the implicit default 'search' plugin, so we must
  # list it back explicitly.
  - search
  # Auto-generates per-page Open Graph / Twitter link-preview cards from each
  # page's title + description (uses site_url for the canonical og:url). Needs
  # Pillow + CairoSVG (see requirements-docs.txt) and cairo/pango system libs,
  # installed in .github/workflows/deploy.yml before `mkdocs build`.
  - social:
      # The theme uses the system font stack (theme.font.text: false), which the
      # social plugin can't rasterize — pin an explicit card font (fetched from
      # Google Fonts at build time; CI has network).
      cards_layout_options:
        font_family: Roboto

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - How biopb fits together: concepts.md
  - Using biopb:
      - Working with your agent: working-with-agents.md
      - Working with napari: using-napari.md
      - Watching your agent: observe.md
  - Running servers:
      - Data (tensor) servers: data-servers.md
      - Algorithm servers: algorithm-servers.md
  - Reference:
      - Configuration: configuration.md
      - Troubleshooting: troubleshooting.md
      - Help & community: help.md
      # SDK API reference — generated and published out-of-band by the biopb
      # repo's release workflow into /docs/api/<lang>/ (see deploy.yml). These
      # are external links; they go live after the first v* release publishes.
      - SDK API (Python): https://biopb.org/docs/api/python/
      - SDK API (Java): https://biopb.org/docs/api/java/
